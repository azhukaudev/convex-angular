# Force a single @better-fetch/fetch copy. better-auth pins 1.2.2 exactly while
# @convex-dev/better-auth resolves ^1.1.18 independently; two copies produce
# incompatible BetterFetch type identities and break the better-auth client
# plugin types (crossDomainClient/convexClient) during the Angular build.
overrides:
  '@better-fetch/fetch': 1.1.21
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  less: false
  lmdb: true
  msgpackr-extract: true
  nx: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@angular-devkit/architect@0.2102.14'
  - '@angular-devkit/build-angular@21.2.14'
  - '@angular-devkit/build-webpack@0.2102.14'
  - '@angular-devkit/core@21.2.14'
  - '@angular-devkit/schematics@21.2.14'
  - '@angular/animations@21.2.16'
  - '@angular/build@21.2.14'
  - '@angular/cdk@21.2.14'
  - '@angular/cli@21.2.14'
  - '@angular/common@21.2.16'
  - '@angular/compiler-cli@21.2.16'
  - '@angular/compiler@21.2.16'
  - '@angular/core@21.2.16'
  - '@angular/forms@21.2.16'
  - '@angular/language-service@21.2.16'
  - '@angular/platform-browser-dynamic@21.2.16'
  - '@angular/platform-browser@21.2.16'
  - '@angular/router@21.2.16'
