<div class="page">
  <cva-page-header
    pageTitle="Basic Example"
    description="Using injectQuery, injectMutation, and injectAction"
    [links]="[{ label: 'See Paginated Example →', path: '/examples/paginated' }]"
  />

  <div class="bulk-actions">
    <button matButton="tonal" (click)="handleCompleteAll()"><mat-icon>check</mat-icon>Complete All</button>
    <button matButton="tonal" (click)="handleReopenAll()"><mat-icon>undo</mat-icon>Reopen All</button>
  </div>

  <form (ngSubmit)="handleAddTodo()" class="add-form">
    <mat-form-field appearance="outline" class="add-form__field" subscriptSizing="dynamic">
      <mat-label>Add new task</mat-label>
      <input matInput #newTaskInput name="new-task" type="text" [(ngModel)]="newTask" autocomplete="off" />
    </mat-form-field>
    <button matButton="filled" type="submit" [disabled]="!newTaskInput.value"><mat-icon>add</mat-icon>New Task</button>
  </form>

  @if (todos.isLoading()) {
    <mat-spinner [diameter]="40" aria-label="loading" />
  } @else {
    <ul class="todo-list">
      @for (task of todos.data(); track task._id) {
        <li>
          <cva-todo-item
            [todo]="task"
            (toggled)="handleTodoChange(task._id, task.completed)"
            (deleted)="handleDeleteTodo(task._id)"
          />
        </li>
      }
    </ul>
  }
</div>
