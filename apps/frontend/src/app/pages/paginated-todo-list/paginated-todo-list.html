<cva-todo-page
  title="Paginated Example"
  description="Using injectPaginatedQuery with load more"
  alternateHref="/examples/basic"
  alternateLabel="See Basic Example"
  [newTask]="newTask()"
  [tasks]="todos.results()"
  [isLoading]="todos.isLoadingFirstPage()"
  spinnerLabel="Loading first page"
  [spinnerCentered]="true"
  emptyMessage="No tasks yet. Add one above!"
  (newTaskChange)="newTask.set($event)"
  (addTodo)="todoActions.handleAddTodo()"
  (toggleTodo)="todoActions.handleTodoChange($event.id, $event.completed)"
  (deleteTodo)="todoActions.handleDeleteTodo($event)"
  (completeAll)="todoActions.handleCompleteAll()"
  (reopenAll)="todoActions.handleReopenAll()"
>
  <div todoPageControls class="flex items-center gap-4">
    <div class="flex items-center gap-2">
      <label for="pageSize" class="text-sm font-medium">Page Size:</label>
      <p-inputNumber
        inputId="pageSize"
        [(ngModel)]="pageSize"
        [min]="1"
        [max]="50"
        [showButtons]="true"
        buttonLayout="horizontal"
        inputStyleClass="w-16 text-center"
        decrementButtonClass="p-button-secondary"
        incrementButtonClass="p-button-secondary"
        incrementButtonIcon="pi pi-plus"
        decrementButtonIcon="pi pi-minus"
      />
    </div>
    <p-button icon="pi pi-refresh" label="Reset" severity="secondary" size="small" (onClick)="handleReset()" />
  </div>

  <div todoPageFooter class="flex flex-col items-center gap-2 py-4">
    @if (todos.isLoadingMore()) {
      <div class="flex items-center gap-2">
        <p-progress-spinner aria-label="Loading more" class="size-6" strokeWidth="6" />
        <span class="text-sm text-gray-500">Loading more...</span>
      </div>
    } @else if (todos.canLoadMore()) {
      <p-button
        icon="pi pi-arrow-down"
        [label]="'Load More (' + pageSize() + ')'"
        severity="secondary"
        (onClick)="handleLoadMore()"
      />
      <span class="text-xs text-gray-400">{{ todos.results().length }} items loaded</span>
    } @else if (todos.isExhausted()) {
      <div class="flex flex-col items-center gap-1">
        <span class="text-sm font-medium text-green-600">✓ All items loaded</span>
        <span class="text-xs text-gray-400">{{ todos.results().length }} total items</span>
      </div>
    }

    @if (todos.error()) {
      <div class="text-sm text-red-500">
        Error: {{ todos.error()?.message }}
        <button class="ml-2 underline" (click)="handleRetry()">Retry</button>
      </div>
    }
  </div>
</cva-todo-page>
